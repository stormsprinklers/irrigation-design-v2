name: ML Retrain

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ml-retrain]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  export-and-train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require repository secrets
        id: secrets_check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ML_INFERENCE_URL: ${{ secrets.ML_INFERENCE_URL }}
          ML_API_KEY: ${{ secrets.ML_API_KEY }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is not configured (Settings → Secrets and variables → Actions)"
            exit 1
          fi
          if [ -n "$ML_INFERENCE_URL" ] && [ -n "$ML_API_KEY" ]; then
            echo "deploy_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ML_INFERENCE_URL or ML_API_KEY not set — train/eval will run but deploy will be skipped"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Check minimum training examples
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/ml-count-training-examples.mjs

      - name: Export training JSONL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm run training:export -- \
            --output training-export.jsonl \
            --manifest training-split-manifest.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Train and evaluate
        run: |
          pip install -e ml
          python -m placement_ml.train \
            --data training-export.jsonl \
            --manifest training-split-manifest.json \
            --output ml/checkpoints
          python -m placement_ml.evaluate \
            --data training-export.jsonl \
            --checkpoint ml/checkpoints/best.pt \
            --manifest training-split-manifest.json \
            --split all \
            --output ml/checkpoints/eval_metrics.json

      - name: Upload checkpoint artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: placement-ml-checkpoint
          path: |
            ml/checkpoints/best.pt
            ml/checkpoints/eval_metrics.json
            ml/checkpoints/feature_vocab.json

      - name: Check promotion sanity (advisory metrics)
        id: promote
        continue-on-error: true
        run: node scripts/ml-check-promotion.mjs ml/checkpoints/eval_metrics.json

      - name: Promotion sanity failed
        if: steps.promote.outcome != 'success'
        run: |
          echo "::warning::Promotion sanity check failed (empty export or extreme head-count delta)."
          echo "Checkpoint artifact is still available; deploy skipped to avoid a runaway model."

      - name: Deploy checkpoint to Railway ML service
        if: steps.promote.outcome == 'success' && steps.secrets_check.outputs.deploy_ready == 'true'
        env:
          ML_INFERENCE_URL: ${{ secrets.ML_INFERENCE_URL }}
          ML_API_KEY: ${{ secrets.ML_API_KEY }}
        run: node scripts/ml-deploy-checkpoint.mjs ml/checkpoints/best.pt

      - name: Register model version in database
        if: steps.promote.outcome == 'success'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ML_MODEL_VERSION: ${{ secrets.ML_MODEL_VERSION || 'v1' }}
        run: node scripts/ml-register-model.mjs ml/checkpoints/eval_metrics.json

